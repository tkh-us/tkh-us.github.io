<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thang Huynh | Business Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; color: #1a1a2e; background: #fff; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 60px; border-bottom: 1px solid #e8e8e8; }
    nav .logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; color: #1a1a2e; text-decoration: none; }
    nav ul { list-style: none; display: flex; gap: 36px; }
    nav ul a { text-decoration: none; font-family: 'Arial', sans-serif; font-size: 0.9rem; color: #555; letter-spacing: 0.5px; transition: color 0.2s; }
    nav ul a:hover { color: #1a1a2e; }
    .hero { display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 100px 60px 80px; background: linear-gradient(135deg, #f8f9fc 0%, #eef1f8 100%); }
    .hero .eyebrow { font-family: 'Arial', sans-serif; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #4a6fa5; margin-bottom: 20px; }
    .hero h1 { font-size: 3rem; line-height: 1.2; color: #1a1a2e; max-width: 700px; margin-bottom: 24px; }
    .hero p { font-size: 1.15rem; color: #555; max-width: 560px; line-height: 1.8; margin-bottom: 40px; font-family: 'Arial', sans-serif; }
    .btn { display: inline-block; padding: 16px 40px; background: #1a1a2e; color: #fff; font-family: 'Arial', sans-serif; font-size: 0.9rem; letter-spacing: 1px; text-decoration: none; border-radius: 2px; transition: background 0.2s; }
    .btn:hover { background: #4a6fa5; }
    .about { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; padding: 100px 60px; max-width: 1100px; margin: 0 auto; align-items: center; }
    .about-text h2 { font-size: 2rem; margin-bottom: 20px; color: #1a1a2e; }
    .about-text p { font-family: 'Arial', sans-serif; font-size: 1rem; color: #555; line-height: 1.9; margin-bottom: 16px; }
    .about-visual { border-radius: 8px; overflow: hidden; height: 360px; } .about-visual img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .services { background: #f8f9fc; padding: 100px 60px; text-align: center; }
    .services h2 { font-size: 2rem; margin-bottom: 12px; color: #1a1a2e; }
    .services .subtitle { font-family: 'Arial', sans-serif; color: #777; margin-bottom: 60px; font-size: 1rem; }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; max-width: 1000px; margin: 0 auto; }
    .service-card { background: #fff; padding: 40px 32px; border-radius: 4px; border: 1px solid #e8e8e8; text-align: left; transition: box-shadow 0.2s; }
    .service-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .service-card .icon { font-size: 2rem; margin-bottom: 20px; }
    .service-card h3 { font-size: 1.1rem; margin-bottom: 12px; color: #1a1a2e; }
    .service-card p { font-family: 'Arial', sans-serif; font-size: 0.9rem; color: #777; line-height: 1.8; }
    .cta { padding: 100px 60px; text-align: center; }
    .cta h2 { font-size: 2.2rem; margin-bottom: 16px; color: #1a1a2e; }
    .cta p { font-family: 'Arial', sans-serif; color: #777; margin-bottom: 40px; font-size: 1rem; }
